<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fbc2eb, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    transition: background 1s ease;
}
.night {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}


.square {
    position: relative;
    width: 90vw;
    max-width: 620px;
    aspect-ratio: 1 / 1;
    background: rgba(255,255,255,0.15);
    border-radius: 30px;
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.3);
}


.corner {
    position: absolute;
    width: 22%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,255,255,0.7);
}

.corner:hover {
    transform: scale(1.1) rotate(2deg);
    box-shadow: 0 0 30px rgba(255,255,255,1);
}

.top-left { top: 3%; left: 3%; }
.top-right { top: 3%; right: 3%; }
.bottom-left { bottom: 3%; left: 3%; }
.bottom-right { bottom: 3%; right: 3%; }


.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 20px;
}


.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
}


h1 {
    color: black;
    font-size: clamp(20px, 4vw, 30px);
    text-shadow: 0 0 6px rgba(255,255,255,0.6);
}

p {
    color: black;
    font-size: clamp(13px, 3.5vw, 16px);
    min-height: 140px;
    line-height: 1.6;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

#proposal {
    display: none;
    color: black;
    font-size: clamp(18px, 4vw, 22px);
    margin-top: 20px;
    text-shadow: 0 0 8px rgba(255,182,193,0.8);
}


.night h1,
.night p,
.night #proposal {
    color: white;
    text-shadow:
        0 0 5px rgba(255,255,255,0.8),
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,105,180,0.8);
}


button {
    padding: 10px 18px;
    font-size: clamp(12px, 3vw, 16px);
    border: none;
    border-radius: 25px;
    background: rgba(255,255,255,0.9);
    color: #ff4d88;
    font-weight: bold;
    cursor: pointer;
    margin-top: 12px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255,255,255,0.9);
}

#loveBtn {
    display: none;
}


.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}


.heart {
    position: absolute;
    color: white;
    animation: float 7s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="square">

    <!-- 📸 Images -->
    <img src="1.jpeg" class="corner top-left" onclick="openViewer(this.src)">
    <img src="2.jpeg" class="corner top-right" onclick="openViewer(this.src)">
    <img src="3.jpeg" class="corner bottom-left" onclick="openViewer(this.src)">
    <img src="4.jpeg" class="corner bottom-right" onclick="openViewer(this.src)">

    <div class="center">
        <h1>Hi baby 💖</h1>

        <p id="message"></p>

        <button onclick="openMessage()">Open 💌</button>
        <br>
        <button id="loveBtn" onclick="finalSurprise()">Click if you love me 💘</button>

        <div id="proposal">I LOVE YOU MORE BABY!</div>
    </div>

</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
    <img id="viewerImg">
</div>

<audio id="bgMusic" loop>
    <source src="m.mp3" type="audio/mpeg">
</audio>

<script>
const text = `I don’t even know where to start…

but I just want you to know that you mean so much to me.

You make everything better just by being in my life.

And no matter what happens,
I’ll always choose you.

I love you, baby 💕`;

function openMessage() {
    document.getElementById("bgMusic").play();
    typeText();
}

function typeText() {
    let i = 0;
    const msg = document.getElementById("message");
    msg.innerHTML = "";

    function typing() {
        if (i < text.length) {
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 35);
        } else {
            document.getElementById("loveBtn").style.display = "inline-block";
        }
    }
    typing();
}


function finalSurprise() {
    document.body.classList.add("night");
    document.getElementById("proposal").style.display = "block";

    for (let i = 0; i < 100; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.top = Math.random() * 100 + "vh";
        star.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(star);
    }
}


function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}


setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}, 300);
</script>

</body>
</html>
